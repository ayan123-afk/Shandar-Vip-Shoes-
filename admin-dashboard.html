<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Shandar VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { background: #f4f4f4; font-family: sans-serif; display: flex; }
        .sidebar { width: 250px; background: #0d0d0d; color: white; height: 100vh; padding: 20px; }
        .main { flex: 1; padding: 40px; overflow-y: auto; height: 100vh; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .nav-item { padding: 10px; cursor: pointer; border-radius: 4px; margin-bottom: 5px; }
        .nav-item:hover { background: #00f0ff; color: black; }
        .status-btn { padding: 5px 10px; background: #00ff9f; border: none; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Shandar Admin</h3><br>
        <div class="nav-item" onclick="show('products')">Products</div>
        <div class="nav-item" onclick="show('orders')">Orders</div>
        <div class="nav-item" onclick="show('messages')">Messages</div>
        <div class="nav-item" onclick="logout()">Logout</div>
    </div>
    <div class="main">
        <div id="products-sec" class="content">
            <h2>Add Product</h2>
            <div class="card">
                <input type="text" id="p-name" placeholder="Name">
                <input type="text" id="p-desc" placeholder="Description">
                <input type="number" id="p-price" placeholder="Price">
                <input type="text" id="p-img" placeholder="PostImage URL">
                <button onclick="addProduct()" style="margin-top:10px;">Save Product</button>
            </div>
            <div id="p-list"></div>
        </div>

        <div id="orders-sec" class="content" style="display:none">
            <h2>Manage Orders</h2>
            <div id="o-list"></div>
        </div>

        <div id="messages-sec" class="content" style="display:none">
            <h2>Contact Messages</h2>
            <div id="m-list"></div>
        </div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.getElementById(id + '-sec').style.display = 'block';
            if(id === 'orders') loadOrders();
            if(id === 'messages') loadMessages();
        }

        async function addProduct() {
            const payload = {
                name: document.getElementById('p-name').value,
                description: document.getElementById('p-desc').value,
                price: document.getElementById('p-price').value,
                image_url: document.getElementById('p-img').value
            };
            const { error } = await _supabase.from('products').insert([payload]);
            if (error) alert(error.message); else alert('Product added!');
        }

        async function loadOrders() {
            const { data } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
            document.getElementById('o-list').innerHTML = `
                <table>
                    <tr><th>Customer</th><th>Total</th><th>Status</th><th>Action</th></tr>
                    ${data.map(o => `
                        <tr>
                            <td>${o.customer_name}<br>${o.phone}</td>
                            <td>Rs. ${o.total_price}</td>
                            <td>${o.status}</td>
                            <td>${o.status === 'pending' ? `<button class="status-btn" onclick="markDelivered('${o.id}')">Delivered</button>` : '✓'}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }

        async function markDelivered(id) {
            await _supabase.from('orders').update({ status: 'delivered' }).eq('id', id);
            loadOrders();
        }

        async function loadMessages() {
            const { data } = await _supabase.from('contacts').select('*');
            document.getElementById('m-list').innerHTML = data.map(m => `
                <div class="card">
                    <h4>${m.name} (${m.email})</h4>
                    <p>${m.message}</p>
                    <small>${m.created_at}</small>
                </div>
            `).join('');
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = 'admin-login.html';
        }

        // Check Auth
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) window.location.href = 'admin-login.html';
        }
        checkUser();
    </script>
</body>
</html>
