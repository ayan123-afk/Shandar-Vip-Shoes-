<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Shandar VIP Shoes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --side: #0d0d0d;
            --accent: #00f0ff;
            --card: #161616;
            --text: #ffffff;
        }
        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; }

        /* Sidebar */
        .sidebar {
            width: 260px; background: var(--side); height: 100vh; 
            padding: 30px 20px; position: fixed; border-right: 1px solid #222;
        }
        .sidebar img { width: 150px; margin-bottom: 40px; }
        .nav-item {
            padding: 15px; margin-bottom: 10px; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            transition: 0.3s; color: #888;
        }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: #000; }
        .logout-btn {
            position: absolute; bottom: 30px; width: calc(100% - 40px);
            padding: 12px; background: #ff4d4d; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* Main Content */
        .main-content { margin-left: 260px; width: 100%; padding: 40px; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        h1 { margin-bottom: 30px; font-weight: 300; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        /* UI Components */
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--accent); border-bottom: 1px solid #333; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }
        
        input, textarea, select {
            width: 100%; padding: 12px; margin-bottom: 15px; 
            background: #000; border: 1px solid #333; color: white; border-radius: 6px;
        }
        .btn-action {
            background: var(--accent); color: black; border: none;
            padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .pending { background: #ffaa00; color: black; }
        .delivered { background: #00ff9f; color: black; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <img src="https://i.postimg.cc/XJJLGMF3/Chat-GPT-Image-Mar-30-2026-08-43-59-PM.png">
        <div class="nav-item active" onclick="switchTab('inventory', this)"><i class="fas fa-box"></i> Inventory</div>
        <div class="nav-item" onclick="switchTab('orders', this)"><i class="fas fa-shopping-cart"></i> Orders</div>
        <div class="nav-item" onclick="switchTab('messages', this)"><i class="fas fa-envelope"></i> Messages</div>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>

    <!-- MAIN -->
    <div class="main-content">
        
        <!-- INVENTORY SECTION -->
        <div id="inventory" class="section active">
            <h1>Product Management</h1>
            <div class="grid">
                <div class="card">
                    <h3>Current Products</h3>
                    <table id="productTable">
                        <thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Action</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="card">
                    <h3>Add New Shoe</h3>
                    <input type="text" id="pName" placeholder="Shoe Name">
                    <input type="number" id="pPrice" placeholder="Price (PKR)">
                    <input type="text" id="pImg" placeholder="Direct Image URL (PostImage)">
                    <textarea id="pDesc" placeholder="Product Description" rows="4"></textarea>
                    <button class="btn-action" style="width:100%" onclick="addProduct()">Add Product</button>
                </div>
            </div>
        </div>

        <!-- ORDERS SECTION -->
        <div id="orders" class="section">
            <h1>Customer Orders</h1>
            <div class="card">
                <table id="orderTable">
                    <thead><tr><th>Date</th><th>Customer</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- MESSAGES SECTION -->
        <div id="messages" class="section">
            <h1>Messages</h1>
            <div class="card">
                <table id="messageTable">
                    <thead><tr><th>Name</th><th>Message</th><th>Contact</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // --- AUTH GUARD ---
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'admin-login.html';
            }
        }
        checkAuth();

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = 'admin-login.html';
        }

        // --- NAVIGATION ---
        function switchTab(tabId, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            
            if(tabId === 'inventory') fetchProducts();
            if(tabId === 'orders') fetchOrders();
            if(tabId === 'messages') fetchMessages();
        }

        // --- PRODUCT LOGIC ---
        async function fetchProducts() {
            const { data } = await supabase.from('products').select('*');
            const tbody = document.querySelector('#productTable tbody');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td><img src="${p.image_url}" width="40" style="border-radius:5px"></td>
                    <td>${p.name}</td>
                    <td>Rs ${p.price}</td>
                    <td><button onclick="deleteProduct(${p.id})" style="color:#ff4d4d; background:none; border:none; cursor:pointer"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        async function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const image_url = document.getElementById('pImg').value;
            const description = document.getElementById('pDesc').value;

            if(!name || !price || !image_url) return alert("Fill all fields");

            const { error } = await supabase.from('products').insert([{ name, price, image_url, description }]);
            if (error) alert(error.message);
            else {
                alert("Product added!");
                fetchProducts();
                document.getElementById('pName').value = '';
                document.getElementById('pPrice').value = '';
                document.getElementById('pImg').value = '';
                document.getElementById('pDesc').value = '';
            }
        }

        async function deleteProduct(id) {
            if(confirm("Delete this item?")) {
                await supabase.from('products').delete().eq('id', id);
                fetchProducts();
            }
        }

        // --- ORDER LOGIC ---
        async function fetchOrders() {
            const { data } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
            const tbody = document.querySelector('#orderTable tbody');
            tbody.innerHTML = data.map(o => `
                <tr>
                    <td>${new Date(o.created_at).toLocaleDateString()}</td>
                    <td><b>${o.customer_name}</b><br>${o.phone}<br><small>${o.address}</small></td>
                    <td>Rs ${o.total_price}</td>
                    <td><span class="status-badge ${o.status}">${o.status}</span></td>
                    <td>
                        ${o.status === 'pending' ? `<button class="btn-action" onclick="markDelivered(${o.id})">Mark Delivered</button>` : 'Complete'}
                    </td>
                </tr>
            `).join('');
        }

        async function markDelivered(id) {
            await supabase.from('orders').update({ status: 'delivered' }).eq('id', id);
            fetchOrders();
        }

        // --- MESSAGE LOGIC ---
        async function fetchMessages() {
            const { data } = await supabase.from('contacts').select('*').order('created_at', { ascending: false });
            const tbody = document.querySelector('#messageTable tbody');
            tbody.innerHTML = data.map(m => `
                <tr>
                    <td>${m.name}</td>
                    <td>${m.message}</td>
                    <td>${m.email}<br>${m.phone}</td>
                </tr>
            `).join('');
        }

        // Initial Load
        fetchProducts();
    </script>
</body>
</html>
