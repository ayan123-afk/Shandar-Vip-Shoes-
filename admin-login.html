<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | Shandar VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #1a1a1a; padding: 40px; border-radius: 12px; border: 1px solid #00f0ff; width: 100%; max-width: 350px; text-align: center; }
        img { height: 60px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00f0ff; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #errorMsg { color: #ff4d4d; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://i.postimg.cc/XJJLGMF3/Chat-GPT-Image-Mar-30-2026-08-43-59-PM.png">
        <h2>Admin Portal</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="errorMsg"></div>
    </div>

    <script>
        // Check if user is already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'admin-dashboard.html';
            }
        }
        checkSession();

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const errorMsg = document.getElementById('errorMsg');

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorMsg.innerText = error.message;
            } else {
                window.location.href = 'admin-dashboard.html';
            }
        }
    </script>
</body>
</html>
