<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Admin | Shandar Shoes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 240, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar Styles - Enhanced */
        .sidebar {
            width: 300px;
            background: linear-gradient(180deg, rgba(10, 10, 10, 0.95) 0%, rgba(5, 5, 5, 0.98) 100%);
            backdrop-filter: blur(20px);
            height: 100vh;
            padding: 2.5rem 1.5rem;
            border-right: 1px solid rgba(0, 240, 255, 0.1);
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.5);
        }

        .sidebar h2 {
            color: #00f0ff;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid rgba(0, 240, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
        }

        .sidebar h2 i {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.5));
        }

        .nav-item {
            padding: 1rem 1.2rem;
            margin: 0.5rem 0;
            color: #a0a0a0;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: linear-gradient(180deg, #00f0ff, #00c4d4);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .nav-item:hover::before {
            transform: scaleY(1);
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.1) 0%, transparent 100%);
            color: #00f0ff;
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.1);
        }

        .nav-item:hover i {
            transform: scale(1.1);
        }

        .nav-item.logout {
            margin-top: 3rem;
            border-top: 2px solid rgba(255, 255, 255, 0.05);
            padding-top: 1.8rem;
            color: #ff6b6b;
        }

        .nav-item.logout::before {
            background: linear-gradient(180deg, #ff6b6b, #ff4757);
        }

        .nav-item.logout:hover {
            background: linear-gradient(90deg, rgba(255, 107, 107, 0.1) 0%, transparent 100%);
            color: #ff6b6b;
        }

        /* Main Content - Enhanced */
        .main {
            margin-left: 300px;
            padding: 2.5rem 3rem;
            width: calc(100% - 300px);
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Section Headers - Enhanced */
        .main > div h2 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            padding-left: 1.5rem;
            border-left: 5px solid #00f0ff;
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.05) 0%, transparent 100%);
            padding: 1rem 1.5rem;
            border-radius: 0 12px 12px 0;
        }

        .main > div h2 i {
            color: #00f0ff;
            font-size: 2rem;
        }

        /* Card Styles - Enhanced */
        .card {
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.9) 0%, rgba(10, 10, 10, 0.95) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 
                0 15px 40px -10px rgba(0, 240, 255, 0.15),
                0 0 0 1px rgba(0, 240, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Table Styles - Enhanced */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            text-align: left;
            padding: 1.2rem 1rem;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.08) 0%, rgba(0, 240, 255, 0.03) 100%);
            color: #00f0ff;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid rgba(0, 240, 255, 0.2);
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #d0d0d0;
            font-size: 0.95rem;
        }

        tr {
            transition: all 0.3s ease;
        }

        tr:hover td {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.05) 0%, transparent 100%);
            color: #ffffff;
        }

        /* Status Badge - Enhanced */
        .status-badge {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(0, 200, 212, 0.1));
            color: #00f0ff;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 2px 10px rgba(0, 240, 255, 0.1);
        }

        /* Form Styles - Enhanced */
        .form-group {
            margin-bottom: 1.8rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.8rem;
            color: #b0b0b0;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        label i {
            color: #00f0ff;
            font-size: 1rem;
        }

        input, textarea {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.05);
            padding: 14px 18px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            border-radius: 14px;
            width: 100%;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(5px);
        }

        input:hover, textarea:hover {
            border-color: rgba(0, 240, 255, 0.2);
            background: rgba(25, 25, 25, 0.9);
        }

        input:focus, textarea:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 0 4px rgba(0, 240, 255, 0.1);
            background: rgba(30, 30, 30, 0.95);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background: linear-gradient(135deg, #00f0ff 0%, #00c4d4 100%);
            color: #000000;
            border: none;
            padding: 14px 32px;
            font-weight: 700;
            font-size: 0.95rem;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 30px -8px rgba(0, 240, 255, 0.4),
                0 0 0 2px rgba(0, 240, 255, 0.2);
        }

        button:active {
            transform: translateY(-1px);
        }

        /* Messages Card - Enhanced */
        .msg-card {
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.9) 0%, rgba(15, 15, 15, 0.95) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 18px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 1.2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .msg-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(180deg, #00f0ff, #00c4d4);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .msg-card:hover {
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateX(8px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.1);
        }

        .msg-card:hover::before {
            transform: scaleY(1);
        }

        .msg-card b {
            color: #00f0ff;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.8rem;
        }

        .msg-card b i {
            font-size: 1.3rem;
        }

        .msg-card p {
            color: #c0c0c0;
            line-height: 1.6;
            font-size: 0.95rem;
            padding-left: 2rem;
        }

        .msg-meta {
            font-size: 0.8rem;
            color: #777;
            margin-top: 1rem;
            display: flex;
            gap: 1.5rem;
            padding-left: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        .msg-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .msg-meta i {
            font-size: 0.9rem;
            color: #00f0ff;
        }

        /* Empty State - Enhanced */
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: #666;
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.5) 0%, rgba(15, 15, 15, 0.5) 100%);
            border-radius: 20px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.3;
            color: #00f0ff;
        }

        /* Loading Animation */
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Scrollbar - Enhanced */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: linear-gradient(180deg, #0a0a0a, #050505);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
            border-radius: 10px;
            border: 2px solid #0a0a0a;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00f0ff, #00c4d4);
        }

        /* Responsive Design - Enhanced */
        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
                padding: 1.5rem 0.5rem;
            }
            .sidebar h2 span, .sidebar .nav-item span {
                display: none;
            }
            .sidebar h2 i {
                margin: 0 auto;
            }
            .nav-item {
                justify-content: center;
                padding: 1rem;
            }
            .main {
                margin-left: 80px;
                width: calc(100% - 80px);
                padding: 1.5rem;
            }
            .main > div h2 {
                font-size: 1.5rem;
            }
        }

        /* Animation - Enhanced */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .main > div {
            animation: fadeInScale 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card, .msg-card {
            animation: slideInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation-fill-mode: both;
        }

        .msg-card:nth-child(1) { animation-delay: 0.1s; }
        .msg-card:nth-child(2) { animation-delay: 0.2s; }
        .msg-card:nth-child(3) { animation-delay: 0.3s; }
        .msg-card:nth-child(4) { animation-delay: 0.4s; }
        .msg-card:nth-child(5) { animation-delay: 0.5s; }

        /* Glow Effects */
        .glow-text {
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }

        /* Stats Cards (if needed) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.05) 0%, transparent 100%);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 20px;
            padding: 1.8rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(0, 240, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 240, 255, 0.1);
        }

        .stat-card i {
            font-size: 2.5rem;
            color: #00f0ff;
            margin-bottom: 1rem;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .stat-card p {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>
            <i class="fas fa-crown"></i>
            <span>SHANDAR VIP</span>
        </h2>
        <div class="nav-item" onclick="show('orders')">
            <i class="fas fa-shopping-cart"></i>
            <span>Manage Orders</span>
        </div>
        <div class="nav-item" onclick="show('inventory')">
            <i class="fas fa-plus-circle"></i>
            <span>Add Product</span>
        </div>
        <div class="nav-item" onclick="show('msgs')">
            <i class="fas fa-envelope"></i>
            <span>Messages</span>
        </div>
        <div class="nav-item logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </div>
    </div>
    <div class="main">
        <div id="orders-sec">
            <h2><i class="fas fa-shopping-cart"></i> Customer Orders</h2>
            <div class="card">
                <table id="orders-table">
                    <tr><td colspan="4" style="text-align:center; color:#666;"><i class="fas fa-spinner fa-spin"></i> Loading orders...</td></tr>
                </table>
            </div>
        </div>
        <div id="inventory-sec" style="display:none">
            <h2><i class="fas fa-plus-circle"></i> Add New Release</h2>
            <div class="card">
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Shoe Name</label>
                    <input id="p-name" placeholder="e.g., Shandar VIP Elite">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-rupee-sign"></i> Price (PKR)</label>
                    <input id="p-price" placeholder="e.g., 12999">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Product Description</label>
                    <textarea id="p-desc" placeholder="Describe the product..."></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-image"></i> Image URL</label>
                    <input id="p-img" placeholder="https://...">
                </div>
                <button onclick="saveProduct()">
                    <i class="fas fa-save"></i> Save Drop
                </button>
            </div>
        </div>
        <div id="msgs-sec" style="display:none">
            <h2><i class="fas fa-envelope"></i> Customer Messages</h2>
            <div id="msg-list"></div>
        </div>
    </div>

    <script>
        // AUTHENTICATION CHECK - NEW FEATURE
        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                window.location.href = 'admin-login.html';
                return false;
            }
            return true;
        }

        // ORIGINAL FUNCTIONS - NO CHANGES MADE
        function show(id) {
            document.querySelectorAll('.main > div').forEach(d => d.style.display = 'none');
            document.getElementById(id + '-sec').style.display = 'block';
            if(id === 'orders') loadOrders();
            if(id === 'msgs') loadMsgs();
        }

        async function saveProduct() {
            const { error } = await _supabase.from('products').insert([{
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                description: document.getElementById('p-desc').value,
                image_url: document.getElementById('p-img').value
            }]);
            if (!error) {
                alert('New Release Saved');
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
                document.getElementById('p-desc').value = '';
                document.getElementById('p-img').value = '';
            } else {
                alert('Error: ' + error.message);
            }
        }

        async function loadOrders() {
            const { data } = await _supabase.from('orders').select('*').order('created_at', {ascending: false});
            if (data && data.length > 0) {
                document.getElementById('orders-table').innerHTML = `
                    <thead>
                        <tr><th>Customer</th><th>Phone</th><th>Total</th><th>Status</th></tr>
                    </thead>
                    <tbody>
                        ${data.map(o => `
                            <tr>
                                <td><i class="fas fa-user"></i> ${o.customer_name || 'N/A'}</td>
                                <td><i class="fas fa-phone"></i> ${o.phone || 'N/A'}</td>
                                <td><i class="fas fa-rupee-sign"></i> ${parseFloat(o.total_price).toLocaleString()}</td>
                                <td><span class="status-badge"><i class="fas fa-clock"></i> ${o.status || 'Pending'}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;
            } else {
                document.getElementById('orders-table').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:3rem;"><i class="fas fa-inbox"></i><br>No orders found</td></tr>';
            }
        }

        async function loadMsgs() {
            const { data } = await _supabase.from('contacts').select('*');
            if (data && data.length > 0) {
                document.getElementById('msg-list').innerHTML = data.map(m => `
                    <div class="msg-card">
                        <b><i class="fas fa-user-circle"></i> ${m.name || 'Anonymous'}</b>
                        <p><i class="fas fa-envelope-open-text"></i> ${m.message || 'No message'}</p>
                        <div class="msg-meta">
                            <span><i class="fas fa-envelope"></i> ${m.email || 'No email'}</span>
                            <span><i class="fas fa-phone"></i> ${m.phone || 'No phone'}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('msg-list').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><br>No messages yet</div>';
            }
        }

        async function logout() { 
            await _supabase.auth.signOut(); 
            window.location.href = 'admin-login.html'; 
        }
        
        // MODIFIED WINDOW.ONLOAD TO INCLUDE AUTH CHECK
        window.onload = async function() {
            const isAuthenticated = await checkAuth();
            if (isAuthenticated) {
                loadOrders();
            }
        };
    </script>
</body>
</html>
